<script>
(function() {
  var map = L.map('map_1023', {
    scrollWheelZoom: false
  }).setView([10, 20], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 18
  }).addTo(map);

  fetch('../clients.json')
    .then(function(r) { return r.json(); })
    .then(function(clients) {
      clients.sort(function(a, b) { return a.name.localeCompare(b.name); });

      clients.forEach(function(c) {
        L.circleMarker([c.latitude, c.longitude], {
          radius: 7,
          fillColor: 'rgba(30,115,190,0.8)',
          color: '#fff',
          weight: 1,
          fillOpacity: 0.8
        })
        .bindPopup('<strong>' + c.name + '</strong><br>' + c.location)
        .addTo(map);
      });

      var listEl = document.getElementById('client-list');
      if (listEl) {
        listEl.innerHTML = clients.map(function(c) {
          return '<p><strong>' + c.name + '</strong><br />' + c.location + '</p>';
        }).join('\n');
      }
    });
})();
</script>
